<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <radialGradient id="g1" cx="15%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="40%" r="35%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="20%" r="30%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="white" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#g1)"/>
  <rect width="1200" height="300" fill="url(#g2)"/>
  <rect width="1200" height="300" fill="url(#g3)"/>
  <rect width="1200" height="300" fill="url(#dots)"/>
  <!-- Subtle geometric accents -->
  <line x1="0" y1="299" x2="1200" y2="299" stroke="url(#g1)" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="80" r="60" fill="none" stroke="#14b8a6" stroke-width="0.5" opacity="0.1"/>
  <circle cx="200" cy="80" r="90" fill="none" stroke="#14b8a6" stroke-width="0.3" opacity="0.06"/>
  <circle cx="950" cy="200" r="70" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.08"/>
  <circle cx="950" cy="200" r="110" fill="none" stroke="#6366f1" stroke-width="0.3" opacity="0.04"/>
  <rect x="500" y="60" width="200" height="180" rx="100" fill="none" stroke="#14b8a6" stroke-width="0.3" opacity="0.05" transform="rotate(20 600 150)"/>
</svg>
