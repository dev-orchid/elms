<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <!-- Desk/table -->
  <rect x="100" y="280" width="300" height="8" rx="4" fill="#0d9488" opacity="0.25"/>

  <!-- Laptop -->
  <rect x="160" y="200" width="180" height="120" rx="8" fill="#334155"/>
  <rect x="168" y="208" width="164" height="96" rx="4" fill="#1e293b"/>
  <!-- Screen content lines -->
  <rect x="184" y="224" width="80" height="4" rx="2" fill="#14b8a6" opacity="0.8"/>
  <rect x="184" y="236" width="60" height="4" rx="2" fill="#14b8a6" opacity="0.6"/>
  <rect x="184" y="248" width="100" height="4" rx="2" fill="#94a3b8" opacity="0.5"/>
  <rect x="184" y="260" width="40" height="4" rx="2" fill="#94a3b8" opacity="0.5"/>
  <!-- Progress bar on screen -->
  <rect x="184" y="276" width="132" height="8" rx="4" fill="#334155"/>
  <rect x="184" y="276" width="88" height="8" rx="4" fill="#14b8a6" opacity="0.9"/>
  <!-- Play button on screen -->
  <circle cx="308" cy="240" r="16" fill="#14b8a6" opacity="0.3"/>
  <path d="M303 232 L316 240 L303 248Z" fill="#14b8a6"/>
  <!-- Laptop base -->
  <path d="M140 320 L160 320 L160 316 L340 316 L340 320 L360 320 L355 328 L145 328Z" fill="#475569"/>

  <!-- Book stack (left) -->
  <rect x="80" y="256" width="60" height="10" rx="2" fill="#14b8a6" opacity="0.7" transform="rotate(-3 80 256)"/>
  <rect x="82" y="244" width="56" height="10" rx="2" fill="#0d9488" opacity="0.6" transform="rotate(2 82 244)"/>
  <rect x="78" y="232" width="62" height="10" rx="2" fill="#14b8a6" opacity="0.8" transform="rotate(-1 78 232)"/>

  <!-- Coffee cup (right) -->
  <rect x="370" y="260" width="30" height="36" rx="4" fill="#64748b" opacity="0.5"/>
  <path d="M400 270 Q416 270 416 282 Q416 294 400 294" stroke="#64748b" stroke-width="3" fill="none" opacity="0.4"/>
  <!-- Steam -->
  <path d="M380 254 Q382 244 386 248 Q390 252 388 242" stroke="#94a3b8" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M388 256 Q390 246 394 250 Q398 254 396 244" stroke="#94a3b8" stroke-width="1.5" fill="none" opacity="0.35" stroke-linecap="round"/>

  <!-- Floating elements -->
  <!-- Graduation cap -->
  <g transform="translate(340, 120)" opacity="0.7">
    <path d="M0 20 L30 8 L60 20 L30 32Z" fill="#0d9488"/>
    <rect x="28" y="20" width="4" height="20" fill="#0d9488"/>
    <path d="M18 24 L18 36 Q30 44 42 36 L42 24" stroke="#0d9488" stroke-width="2" fill="none"/>
  </g>

  <!-- Certificate/badge -->
  <g transform="translate(80, 140)" opacity="0.6">
    <circle cx="24" cy="24" r="24" fill="#14b8a6" opacity="0.15"/>
    <circle cx="24" cy="24" r="16" fill="none" stroke="#0d9488" stroke-width="2"/>
    <path d="M18 24 L22 28 L30 20" stroke="#0d9488" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Chart icon -->
  <g transform="translate(380, 160)" opacity="0.5">
    <rect x="0" y="20" width="8" height="20" rx="2" fill="#0d9488"/>
    <rect x="12" y="10" width="8" height="30" rx="2" fill="#0d9488"/>
    <rect x="24" y="0" width="8" height="40" rx="2" fill="#0d9488"/>
  </g>

  <!-- Small dots decoration -->
  <circle cx="120" cy="180" r="3" fill="#14b8a6" opacity="0.3"/>
  <circle cx="400" cy="130" r="2" fill="#14b8a6" opacity="0.25"/>
  <circle cx="160" cy="130" r="2.5" fill="#14b8a6" opacity="0.28"/>
  <circle cx="440" cy="220" r="2" fill="#14b8a6" opacity="0.2"/>
  <circle cx="60" cy="300" r="2" fill="#14b8a6" opacity="0.25"/>

  <!-- Person silhouette sitting -->
  <g transform="translate(220, 100)" opacity="0.5">
    <circle cx="30" cy="20" r="18" fill="#0d9488"/>
    <path d="M10 50 Q10 38 30 38 Q50 38 50 50 L50 80 L10 80Z" fill="#0d9488"/>
  </g>
</svg>
